version: '3.8'

services:
  # 应用服务
  gushi-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
    volumes:
      - ./data:/app/data
      - ./prisma:/app/prisma
    restart: unless-stopped
    depends_on:
      - gushi-db

  # 开发环境服务（可选）
  gushi-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./dev.db
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    command: npm run dev
    depends_on:
      - gushi-db

  # 数据库服务（SQLite 在容器内运行）
  gushi-db:
    image: alpine:latest
    volumes:
      - sqlite_data:/app/data
    command: >
      sh -c "mkdir -p /app/data && 
             chown -R 1000:1000 /app/data && 
             echo 'SQLite 数据目录已准备'"
    restart: unless-stopped

  # Redis 缓存服务（可选，用于会话缓存）
  gushi-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Nginx 反向代理（可选）
  gushi-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - gushi-app
    restart: unless-stopped

volumes:
  sqlite_data:
  redis_data: